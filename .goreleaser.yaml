version: 2

before:
  hooks:
    - go mod tidy
    # Fetch + embed ripgrep and ast-grep binaries for every supported
    # (GOOS, GOARCH). Generates bundled_<os>_<arch>.go files tagged
    # `//go:build stado_embed_binaries && <goos> && <goarch>` that
    # `//go:embed` the blobs written under bundled/. The release build
    # below sets -tags stado_embed_binaries so each cross-compile picks
    # up exactly one of these files.
    - go run ./hack/fetch-binaries.go

builds:
  - id: stado
    main: ./cmd/stado
    binary: stado
    env:
      - CGO_ENABLED=0
    # `stado_embed_binaries` activates per-platform //go:embed files for
    # ripgrep + ast-grep (PLAN §4.1/4.2). Dev builds omit the tag and
    # fall back to PATH resolution.
    tags:
      - stado_embed_binaries
    # Reproducible-build flags (PLAN.md §10.1):
    #   -trimpath strips GOPATH / absolute module paths from binary → same
    #     inputs → same output regardless of checkout location.
    #   -buildvcs=true embeds the HEAD commit sha via debug/buildinfo so
    #     `stado verify --show-build-info` can expose it.
    flags:
      - -trimpath
      - -buildvcs=true
    # Fixed build time: pinned to the tag's commit timestamp so two
    # rebuilds of the same tag produce identical sha256 (PLAN §10.1).
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{ .CommitDate }}
      - -buildid=                     # clear build-id (non-deterministic)

# SLSA + SBOM: enabled for release builds; no-op on snapshots.
sboms:
  - artifacts: archive

# Cosign keyless + minisign (dual scheme, PLAN §10.3).
signs:
  - id: cosign
    cmd: cosign
    certificate: "${artifact}.cert"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "--yes"
      - "${artifact}"
    artifacts: checksum
    output: true

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

# nfpms produces .deb (apt) and .rpm (dnf/yum) packages per PLAN §10.7.
# Signing keys live outside the repo; populate
# `fpm_signing_key_file` in the release environment when publishing to
# a signed repo. Snapshot builds emit unsigned packages for testing.
nfpms:
  - id: stado
    package_name: stado
    vendor: stado maintainers
    homepage: https://github.com/foobarto/stado
    maintainer: stado maintainers <noreply@stado.local>
    description: |
      stado — sandboxed, git-native coding-agent runtime.
      Signed commits as audit log. WASM plugins. OpenAI-, Anthropic-,
      Google-, and OAI-compat providers.
    license: MIT
    formats:
      - deb
      - rpm
    # Only package native-executable targets — Windows/Darwin ship as
    # archives via the archives block above.
    builds:
      - stado
    bindir: /usr/bin
    contents:
      - src: LICENSE
        dst: /usr/share/doc/stado/LICENSE
      - src: README.md
        dst: /usr/share/doc/stado/README.md
    rpm:
      group: Applications/Development
    deb:
      fields:
        Bugs: https://github.com/foobarto/stado/issues

# Homebrew tap — foobarto/homebrew-tap is live; goreleaser opens a
# PR against it on each tagged release.
#
# Cross-repo PRs need a PAT with `repo` scope on the tap — Actions'
# default GITHUB_TOKEN only covers the current repo. Provision a PAT
# in the release environment as HOMEBREW_TAP_TOKEN; repository.token
# below picks it up via env interpolation. Without the secret the
# step auto-skips (skip_upload: auto → true when a snapshot OR when
# repository.token evaluates empty), so the release as a whole still
# succeeds; only the tap PR is missing.
brews:
  - name: stado
    repository:
      owner: foobarto
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/foobarto/stado
    description: Sandboxed, git-native coding-agent runtime
    license: MIT
    skip_upload: auto
    # Formula template — goreleaser derives url + sha256 from the
    # release archives above. Targets macOS + Linux Homebrew installs.
    install: |
      bin.install "stado"
    test: |
      system "#{bin}/stado", "version"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^ci:"
      - "^chore:"
