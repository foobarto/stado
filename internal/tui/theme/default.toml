name = "stado-green"

# Palette (user-supplied):
#   BG=#0B0F0E              FG=#E6EAEA
#   GREEN_PRIMARY=#7CFF9E   GREEN_TERM=#39D98A   GREEN_DIM=#2F7A5C
#   GRAY_1=#111716          GRAY_2=#2A2F2E       GRAY_3=#AAB3B1
#   GLOW=#00FF88            ERROR=#FF5C5C
#
# Mapping notes: no yellow in the palette, so `warning` doubles up on
# GREEN_PRIMARY — intensity (vs. GREEN_TERM for success) carries the
# "needs attention" signal. If a distinct warning hue is needed later,
# override `warning` in ~/.config/stado/theme.toml.

[colors]
background      = "#0B0F0E"   # BG
surface         = "#111716"   # GRAY_1
border          = "#2A2F2E"   # GRAY_2
primary         = "#7CFF9E"   # GREEN_PRIMARY
accent          = "#00FF88"   # GLOW
muted           = "#2F7A5C"   # GREEN_DIM
success         = "#39D98A"   # GREEN_TERM
warning         = "#7CFF9E"   # GREEN_PRIMARY (intensity-coded)
error           = "#FF5C5C"   # ERROR

text            = "#E6EAEA"   # FG
text_dim        = "#AAB3B1"   # GRAY_3
text_secondary  = "#AAB3B1"   # GRAY_3

role_user       = "#7CFF9E"   # GREEN_PRIMARY
role_assistant  = "#E6EAEA"   # FG
role_thinking   = "#00FF88"   # GLOW
role_tool       = "#39D98A"   # GREEN_TERM
role_system     = "#AAB3B1"   # GRAY_3

[layout]
sidebar_width     = 32
sidebar_min_width = 24
border_style      = "rounded"
padding           = 1
message_indent    = 2
