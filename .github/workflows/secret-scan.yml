name: secret-scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Skip secret-scan when CI is already running on the same ref —
# avoids redundant scans on a quick push-then-PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # gitleaks scans full history on push so changes that try
          # to add a secret AND backdate it via rebase still get
          # caught. PR scans use the diff range only (faster).
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: ${{ github.workspace }}/.gitleaks.toml
          # PRs scan only the diff range; pushes scan the full repo
          # snapshot at HEAD.
          GITLEAKS_ENABLE_COMMENTS: false
