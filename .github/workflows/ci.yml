name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests (CGO enabled for -race)
        # -race requires cgo; the build matrix below still validates
        # CGO_ENABLED=0 for every target so release binaries stay pure-Go.
        run: CGO_ENABLED=1 go test -race -v ./...

      - name: govulncheck
        # Pin a version instead of @latest so the go.sum cache catches
        # the download — otherwise sum.golang.org hiccups fail CI.
        # Retry once on transient network errors.
        run: |
          set -e
          for i in 1 2 3; do
            go install golang.org/x/vuln/cmd/govulncheck@v1.1.4 && break
            echo "retry $i: govulncheck install hiccup, sleeping"
            sleep 10
          done
          govulncheck ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.4
          args: --timeout=5m

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -o /dev/null ./cmd/stado
